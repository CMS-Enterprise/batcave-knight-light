on:
  workflow_call:
    inputs:
      image_tag:
        type: string
        description: image tag to update in manifest

jobs:
  create-deployment-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Pull Manifest
        uses: actions/checkout@v4
        with:
          repository: CMS-Enterprise/batcave-knight-light-manifest
          ref: main
          ssh-key: ${{ secrets.MANIFEST_DEPLOY_TOKEN }}

      - uses: imranismail/setup-kustomize@v2
      - run: |-
          kustomize version
          ls -la
           cd batcave-knight-light-manifest
          kustomize edit set image ${{ inputs.image_tag}}
          git commit -am "Set image tag as ${{ inputs.image_tag }}"
          git push