on:
  workflow_call:
    inputs:
      image_tag:
        type: string
        description: image tag to update in manifest
    secrets:
      MANIFEST_DEPLOY_TOKEN:
        required: true

jobs:
  create-deployment-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Manifest
        run: |
          echo "${{ secrets.MANIFEST_DEPLOY_TOKEN }}" > knight-light-manifest.key
          chmod 600 knight-light-manifest.key
          export GIT_SSH_COMMAND="ssh -i $(pwd)/knight-light-manifest.key"
          git clone git@github.com:CMS-Enterprise/batcave-knight-light-manifest.git
          ls -lah

      - uses: imranismail/setup-kustomize@v2
      - run: |-
          kustomize version
          ls -la
           cd batcave-knight-light-manifest
          kustomize edit set image ${{ inputs.image_tag}}
          git commit -am "Set image tag as ${{ inputs.image_tag }}"
          git push